services:
  - type: web
    name: wonder-naga-project
    env: python
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn microblog:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: wonder-naga-db
          property: connectionString
