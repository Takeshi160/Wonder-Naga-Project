services:
  - type: web
    name: wonder-naga-project
    env: python

    buildCommand: |
      pip install -r requirements.txt
      export FLASK_APP=microblog.py
      flask db upgrade

    startCommand: gunicorn microblog:app

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: FLASK_APP
        value: microblog.py

      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        fromDatabase:
          name: wonder-naga-db
          property: connectionString
